<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>달빛치과 CMS</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <img src="/imgs/logo.png" alt="달빛치과의원" class="login-logo">
      <h1>달빛치과 CMS</h1>
      <p class="login-hint">관리자 비밀번호를 입력하세요.</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required>
        <button type="submit" id="login-submit">로그인</button>
      </form>
      <p id="login-error" class="error-message"></p>
    </div>
  </div>

  <!-- 메인 에디터 화면 -->
  <div id="editor-screen" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <img src="/imgs/logo.png" alt="" class="topbar-logo">
        <span class="topbar-title">달빛치과 CMS</span>
      </div>
      <div class="topbar-right">
        <span id="editor-filename" class="topbar-filename"></span>
        <span id="status-indicator" class="status-idle">대기 중</span>
        <button id="save-btn" class="btn-primary btn-small" disabled>저장</button>
        <button id="reset-btn" class="btn-secondary btn-small" disabled>변경 취소</button>
        <button id="logout-btn" class="btn-text">로그아웃</button>
      </div>
    </header>

    <main class="layout">
      <!-- 파일 목록 -->
      <aside class="sidebar">
        <h2>편집 항목</h2>
        <ul id="file-list" class="file-list">
          <li class="loading">불러오는 중...</li>
        </ul>
      </aside>

      <!-- 폼 (왼쪽 가운데) -->
      <section class="form-pane">
        <div id="form-empty" class="form-empty">
          <p>좌측에서 편집할 항목을 선택하세요.</p>
        </div>
        <div id="form-container" class="form-container" hidden></div>
      </section>

      <!-- 프리뷰 (오른쪽) — 항상 표시 -->
      <section class="preview-pane">
        <div class="preview-toolbar">
          <select id="preview-page" class="preview-select" title="프리뷰 페이지">
            <option value="index.html">홈</option>
            <option value="about.html">병원 소개</option>
            <option value="conservation.html">보존</option>
            <option value="equipment.html">장비</option>
            <option value="implant.html">임플란트</option>
            <option value="laminate.html">라미네이트</option>
            <option value="ortho.html">교정</option>
            <option value="wisdom.html">사랑니</option>
          </select>
          <button id="preview-refresh" class="btn-secondary btn-small" type="button">↻ 새로고침</button>
          <a id="preview-newtab" class="btn-text" href="/" target="_blank" rel="noopener">새 탭 ↗</a>
        </div>
        <iframe id="preview-iframe" class="preview-iframe" title="라이브 프리뷰"></iframe>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="/admin/widgets.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
