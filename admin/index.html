<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>달빛치과 팝업 관리</title>
  <link rel="stylesheet" href="/admin/admin.css?v=20260604-10">
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <img src="/imgs/logo.png" alt="달빛치과의원" class="login-logo">
      <h1>달빛치과 팝업 관리</h1>
      <p class="login-hint">관리자 비밀번호를 입력하세요.</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required>
        <button type="submit" id="login-submit">로그인</button>
      </form>
      <p id="login-error" class="error-message"></p>
    </div>
  </div>

  <!-- 메인 에디터 화면 -->
  <div id="editor-screen" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <img src="/imgs/logo.png" alt="" class="topbar-logo">
        <span class="topbar-title">달빛치과 팝업 관리</span>
      </div>
      <div class="topbar-right">
        <span id="editor-filename" class="topbar-filename"></span>
        <span id="status-indicator" class="status-idle">대기 중</span>
        <span id="sync-indicator" class="sync-indicator sync-unknown">동기화 확인 전</span>
        <button id="save-btn" class="btn-primary btn-small" disabled>저장</button>
        <button id="reset-btn" class="btn-secondary btn-small" disabled>변경 취소</button>
        <button id="logout-btn" class="btn-text">로그아웃</button>
      </div>
    </header>

    <main class="layout">
      <!-- 파일 목록 -->
      <aside class="sidebar">
        <h2>팝업 관리</h2>
        <ul id="file-list" class="file-list">
          <li class="loading">불러오는 중...</li>
        </ul>
      </aside>

      <!-- 팝업 편집 폼 -->
      <section class="form-pane">
        <div id="form-empty" class="form-empty">
          <p>팝업 목록을 불러오는 중입니다.</p>
        </div>
        <div id="form-container" class="form-container" hidden></div>
      </section>

      <!-- 실제 팝업 전용 프리뷰 -->
      <section class="preview-pane">
        <div class="preview-toolbar">
          <div class="preview-title">
            <strong>팝업 미리보기</strong>
            <span id="sync-detail">기준일에 실제로 뜨는 팝업</span>
          </div>
          <div class="preview-controls" aria-label="팝업 선택">
            <button type="button" id="popup-preview-prev" class="btn-secondary btn-small" disabled>이전</button>
            <span id="popup-preview-count" class="popup-preview-count">0 / 0</span>
            <button type="button" id="popup-preview-next" class="btn-secondary btn-small" disabled>다음</button>
          </div>
          <label class="preview-date-label">
            기준일
            <input type="date" id="preview-date" class="preview-date">
          </label>
        </div>
        <div id="popup-preview-stage" class="popup-preview-stage">
          <div id="popup-preview-viewport" class="popup-preview-viewport">
            <div id="popup-preview-viewport-label" class="popup-preview-viewport-label">메인 화면 1280 x 720</div>
            <div id="popup-preview-empty" class="popup-preview-empty">표시 기간에 해당하는 팝업이 없습니다.</div>
            <div id="popup-preview" class="notice-popups" aria-label="팝업 미리보기"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="save-overlay" class="save-overlay" hidden>
    <div class="save-overlay__panel" role="status" aria-live="polite">
      <strong id="save-overlay-title">저장 중</strong>
      <p id="save-overlay-message">팝업 데이터를 저장하고 있습니다.</p>
      <div class="save-progress" aria-hidden="true">
        <span id="save-overlay-bar"></span>
      </div>
      <span id="save-overlay-state" class="save-overlay__state">처리 중</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="/admin/widgets.js?v=20260604-10"></script>
  <script src="/admin/admin.js?v=20260604-10"></script>
</body>
</html>
