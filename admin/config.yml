                  - label: "Badge"
                    name: "badge"
                    widget: string
                    required: false
                  - label: "Name"
                    name: "name"
                    widget: string
                    required: false
                  - label: "Name En"
                    name: "nameEn"
                    widget: string
                    required: false
                  - label: "Role"
                    name: "role"
                    widget: string
                    required: false
                  - label: "Role Ko"
                    name: "roleKo"
                    widget: string
                    required: false
                  - label: "History"
                    name: "history"
                    widget: list
                    field:
                      label: "History"
                      name: "item"
                      widget: string
                      required: false
          - label: "Gallery"
            name: "gallery"
            widget: object
            collapsed: true
            fields:
              - label: "Id"
                name: "id"
                widget: string
                required: false
              - label: "Small"
                name: "small"
                widget: string
                required: false
              - label: "H2 HTML"
                name: "h2Html"
                widget: text
                required: false
              - label: "Lead"
                name: "lead"
                widget: text
                required: false
              - label: "Items"
                name: "items"
                widget: list
                summary: "{{fields.title | default(fields.label | default(fields.name | default(fields.step | default(fields.tag | default(fields.day | default(fields.num))))))}}"
                fields:
                  - label: "Img"
                    name: "img"
                    widget: image
                    required: false
                  - label: "Text"
                    name: "text"
                    widget: string
                    required: false
                  - label: "Span"
                    name: "span"
                    widget: string
                    required: false
          - label: "Cta"
            name: "cta"
            widget: object
            collapsed: true
            fields:
              - label: "Title HTML"
                name: "titleHTML"
                widget: text
                required: false
              - label: "Desc"
                name: "desc"
                widget: text
                required: false
