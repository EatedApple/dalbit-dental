<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>첨단 디지털 장비 - 달빛치과</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body { margin: 0; background: #fff; }
        
        /* Hero Section */
        .equip-hero {
            width: 100%; height: 350px; margin-top: 80px; padding: 0 !important;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; text-align: center; background-size: cover; background-position: center;
            box-sizing: border-box;
        }
        .equip-hero h1 { font-size: 3.2rem; font-weight: 900; margin-bottom: 15px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .equip-hero p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; }

        section { padding: 100px 20px; }
        .inner { max-width: 1050px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 100px; }
        .section-title h2 { font-size: 2.5rem; color: var(--night-navy); font-weight: 900; margin-bottom: 15px; }
        .section-title h2 span { color: var(--moon-gold); }
        .section-title p { color: var(--text-gray); font-size: 1.1rem; }

        /* Overlap Layout */
        .overlap-wrap { display: flex; flex-direction: column; gap: 130px; }
        .ov-item { display: flex; align-items: center; gap: 40px; position: relative; }
        .ov-item:nth-child(even) { flex-direction: row-reverse; }
        
        .ov-img-group { flex: 1.2; position: relative; height: 420px; }
        .ov-main-media { width: 85%; height: 90%; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #f0f0f0; }
        .ov-main-media img { width: 100%; height: 100%; object-fit: cover; }
        
        .ov-sub-img { position: absolute; bottom: 0; right: 0; width: 45%; height: 220px; border-radius: 15px; border: 5px solid #fff; box-shadow: 0 15px 30px rgba(0,0,0,0.15); overflow: hidden; background: #fff; z-index: 5; }
        .ov-sub-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .ov-item:nth-child(even) .ov-main-media { float: right; }
        .ov-item:nth-child(even) .ov-sub-img { right: auto; left: 0; }

        .ov-text { flex: 1; padding: 20px; }
        .ov-text .tag { display: inline-block; background: var(--night-navy); color: var(--moon-gold); padding: 8px 20px; border-radius: 30px; font-weight: 800; font-size: 0.9rem; margin-bottom: 20px; }
        .ov-text h3 { font-size: 2.2rem; color: var(--night-navy); margin: 0 0 20px 0; font-weight: 900; line-height: 1.3; }
        .ov-text p { color: #555; font-size: 1.05rem; line-height: 1.7; word-break: keep-all; }

        .check-list { margin-top: 25px; padding: 0; }
        .check-list li { list-style: none; position: relative; padding-left: 28px; margin-bottom: 12px; font-weight: 700; color: var(--night-navy); font-size: 1.05rem; }
        .check-list li::before { content: '✔'; position: absolute; left: 0; color: var(--moon-gold); font-size: 1.2rem; top: -2px; }

        @media (max-width: 768px) {
            .equip-hero { height: 260px; margin-top: 65px; }
            .equip-hero h1 { font-size: 2.2rem; }
            .section-title { margin-bottom: 60px; }
            .ov-item { flex-direction: column !important; }
            .ov-img-group { width: 100%; height: auto; padding-bottom: 40px; }
            .ov-main-media { width: 100%; height: 250px; float: none !important; }
            .ov-sub-img { width: 55%; height: 140px; top: 180px; bottom: auto; }
            .ov-text { padding: 0; }
            .ov-text h3 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <main>
        <div id="hero-section"></div>

        <section>
            <div class="inner">
                <div class="section-title" id="section-intro"></div>
                <div class="overlap-wrap" id="equipment-container"></div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

<script src="common.js"></script>

    <script>
        // 장비 페이지 전용 렌더링
        function renderPage(data) {
            const equipData = data.equipmentPage;

            // 1. Hero 렌더링
            document.getElementById('hero-section').innerHTML = `
                <div class="equip-hero" style="background-image: linear-gradient(rgba(21, 34, 56, 0.85), rgba(21, 34, 56, 0.85)), url('${equipData.hero.bg}')">
                    <h1>${equipData.hero.title}</h1>
                    <p>${equipData.hero.subtitle}</p>
                </div>
            `;

            // 2. Intro 렌더링
            document.getElementById('section-intro').innerHTML = `
                <h2>${equipData.intro.title}</h2>
                <p>${equipData.intro.desc}</p>
            `;

            // 3. Equipment 리스트 렌더링
            document.getElementById('equipment-container').innerHTML = equipData.items.map(item => `
                <div class="ov-item">
                    <div class="ov-img-group">
                        <div class="ov-main-media">
                            <img src="${item.mainImg}" alt="${item.tag}">
                        </div>
                        <div class="ov-sub-img">
                            <img src="${item.subImg}" alt="진료 결과물">
                        </div>
                    </div>
                    <div class="ov-text">
                        <span class="tag">${item.tag}</span>
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                        <ul class="check-list">
                            ${item.points.map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
