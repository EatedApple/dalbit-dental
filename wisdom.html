<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>턱관절 및 사랑니 - 달빛치과</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body { margin: 0; background: #fff; }
        section { padding: 100px 20px; }
        .inner { max-width: 1100px; margin: 0 auto; }
        
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { font-size: 2.5rem; color: var(--night-navy); font-weight: 900; margin-bottom: 15px; }
        .section-title h2 span { color: var(--moon-gold); }
        .section-title p { color: var(--text-gray); font-size: 1.1rem; }

        /* Hero */
        .sub-hero {
            width: 100%; height: 350px; margin-top: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; text-align: center; background-size: cover; background-position: center;
            box-sizing: border-box; padding: 0 !important;
        }
        .sub-hero h1 { font-size: 3.2rem; font-weight: 900; margin: 0 0 15px 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Intro */
        .intro-msg { text-align: center; padding: 100px 20px; background: #fdfdfd; border-bottom: 1px solid #eee; }
        .intro-msg h3 { font-size: 2.3rem; color: var(--night-navy); margin-bottom: 25px; font-weight: 900; line-height: 1.4; }
        .intro-msg h3 span { color: var(--moon-gold); }
        .intro-msg p { font-size: 1.2rem; color: #555; line-height: 1.9; max-width: 850px; margin: 0 auto; word-break: keep-all; }

        /* Info Cards */
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .info-card { background: #fff; border-radius: 15px; border: 1px solid #eee; padding: 40px 30px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .info-card h4 { font-size: 1.35rem; color: var(--night-navy); margin-bottom: 15px; font-weight: 800; }
        .info-card p { font-size: 0.95rem; color: #777; line-height: 1.7; margin: 0; word-break: keep-all; }

        /* Wisdom Type Grid */
        .type-section { background: #fafafa; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 40px; }
        .type-card { background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; text-align: center; }
        .type-img { width: 100%; height: 140px; background: #f4f4f4; overflow: hidden; }
        .type-img img { width: 100%; height: 100%; object-fit: cover; }
        .type-body { padding: 20px 15px; }
        .type-body h5 { font-size: 1.1rem; color: var(--night-navy); margin-bottom: 8px; font-weight: 800; }
        .type-body p { font-size: 0.85rem; color: #888; line-height: 1.5; margin: 0; }

        /* Notice Box */
        .notice-box { background: #f8f9fa; padding: 50px; border-radius: 20px; border-left: 6px solid var(--night-navy); margin-top: 40px; }
        .notice-list { padding: 0; margin: 0; list-style: none; }
        .notice-list li { margin-bottom: 15px; padding-left: 25px; position: relative; font-size: 1rem; color: #555; line-height: 1.7; }
        .notice-list li::before { content: '•'; position: absolute; left: 0; color: var(--moon-gold); font-weight: 900; font-size: 1.5rem; top: -5px; }

        @media (max-width: 768px) {
            .sub-hero { height: 260px; margin-top: 65px; }
            .info-grid, .type-grid { grid-template-columns: 1fr; }
            .intro-msg h3 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <main>
        <div class="sub-hero" id="hero-section"></div>

        <section class="intro-msg">
            <div class="inner" id="intro-container"></div>
        </section>

        <section>
            <div class="inner">
                <div class="section-title" id="tmj-title-container"></div>
                <div class="info-grid" id="tmj-container"></div>
            </div>
        </section>

        <section class="type-section">
            <div class="inner">
                <div class="section-title">
                    <h2>사랑니 <span>발치 유형</span> 안내</h2>
                    <p>매복 상태에 따라 최적의 방법으로 안전하게 발치합니다.</p>
                </div>
                <div class="type-grid" id="type-container"></div>
            </div>
        </section>

        <section>
            <div class="inner">
                <div class="section-title" id="wisdom-title-container"></div>
                <div class="info-grid" id="wisdom-container"></div>
            </div>
        </section>

        <section style="background: #fafafa; border-top: 1px solid #eee;">
            <div class="inner">
                <div class="section-title">
                    <h2>발치 후 <span>주의사항</span></h2>
                    <p>빠른 회복을 위해 아래 사항을 반드시 준수해 주세요.</p>
                </div>
                <div class="notice-box">
                    <ul id="precaution-container" class="notice-list"></ul>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="common.js"></script>
    <script>
        function renderPage(data) {
            const wData = data.wisdomPage;
            if(!wData) return;

            // 1. Hero
            const heroEl = document.getElementById('hero-section');
            heroEl.style.backgroundImage = `linear-gradient(rgba(21, 34, 56, 0.85), rgba(21, 34, 56, 0.85)), url('${wData.hero.bg}')`;
            heroEl.innerHTML = `<h1>${wData.hero.title}</h1><p>${wData.hero.subtitle}</p>`;

            // 2. Intro
            document.getElementById('intro-container').innerHTML = `
                <h3>${wData.intro.title}</h3>
                <p>${wData.intro.desc}</p>
            `;

            // 3. TMJ (턱관절)
            document.getElementById('tmj-title-container').innerHTML = `
                <h2>${wData.tmj.title}</h2>
                <p>${wData.tmj.desc}</p>
            `;
            document.getElementById('tmj-container').innerHTML = wData.tmj.list.map(t => `
                <div class="info-card">
                    <h4>${t.title}</h4>
                    <p>${t.desc}</p>
                </div>
            `).join('');

            // 4. Wisdom Types (사랑니 유형)
            document.getElementById('type-container').innerHTML = wData.wisdomTypes.map(t => `
                <div class="type-card">
                    <div class="type-img"><img src="${t.img}" alt="${t.title}"></div>
                    <div class="type-body">
                        <h5>${t.title}</h5>
                        <p>${t.desc}</p>
                    </div>
                </div>
            `).join('');

            // 5. Wisdom Reasons (사랑니 사유)
            document.getElementById('wisdom-title-container').innerHTML = `
                <h2>${wData.wisdom.title}</h2>
                <p>${wData.wisdom.desc}</p>
            `;
            document.getElementById('wisdom-container').innerHTML = wData.wisdom.reasons.map(r => `
                <div class="info-card">
                    <h4>${r.title}</h4>
                    <p>${r.desc}</p>
                </div>
            `).join('');

            // 6. Precautions (주의사항)
            document.getElementById('precaution-container').innerHTML = wData.precautions.map(p => `
                <li>${p}</li>
            `).join('');
        }
    </script>
</body>
</html>
