<style>
/* ============================================
   INTRO splash (3.2s)
   ============================================ */
.intro{
  position:fixed; inset:0; z-index:9999;
  background:#0a1428;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:18px; padding:24px;
  transition:opacity .9s ease, visibility .9s ease;
}
.intro::before{
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(800px 400px at 80% 30%, rgba(63,181,217,.18), transparent 60%),
    radial-gradient(600px 400px at 20% 80%, rgba(28,49,104,.5), transparent 60%);
  pointer-events:none;
}
/* (인트로 우상단 달 데코는 제거됨) */
.intro.is-hidden{ opacity:0; visibility:hidden; pointer-events:none; }
.intro__line{
  display:flex; gap:.05em; font-size:clamp(28px, 6vw, 86px);
  font-weight:900; letter-spacing:-.04em; color:#fff; line-height:1;
  font-family:var(--ff-display);
  position:relative; z-index:2;
}
.intro__line span{
  display:inline-block; transform:translateY(120%);
  animation:introUp .9s cubic-bezier(.2,.8,.2,1) forwards;
}
.intro__line span.is-accent{ color:var(--c-accent); }
.intro__line span.sp{ width:.4em; }
.intro__tag{
  margin-top:14px; padding:14px 38px; border:2px solid rgba(255,255,255,.7);
  border-radius:999px; color:#fff; font-size:clamp(14px,1.6vw,20px);
  font-weight:400; letter-spacing:-.02em;            /* 300 → 400 (NanumSquare 에 300 없음) */
  opacity:0; animation:introFade .8s ease 1.4s forwards;
  position:relative; z-index:2;
}
.intro__tag b{ color:var(--c-accent); font-weight:700; }
@keyframes introUp{ to{ transform:translateY(0); } }
@keyframes introFade{ to{ opacity:1; } }

/* ============================================
   HERO carousel
   ============================================ */
.hero{
  position:relative; margin-top:var(--header-h);
  height:min(85vh, 760px); min-height:600px;
  overflow:hidden; background:#0a1428;
}
.hero__track{
  position:absolute; inset:0; display:flex;
  transition:transform .8s cubic-bezier(.65,.05,.36,1);
  will-change:transform;
}
.hero__slide{
  flex:0 0 100%; height:100%; position:relative;
  display:flex; align-items:center; padding:0 8%;
}

/* slide 1 — soft moonlight gradient */
.hero__slide--1{
  background:
    radial-gradient(circle at 85% 25%, rgba(245,227,168,.45) 0%, transparent 45%),
    linear-gradient(101deg, #f7f5ee 0.55%, #e6e3d7 100.55%);
}
.hero__slide--1 .hero__text{ color:var(--c-ink); position:relative; z-index:2; max-width:600px; }
.hero__slide--1 .hero__text h3{
  color:var(--c-muted); font-size:clamp(22px, 2.3vw, 32px);
  margin-bottom:14px; font-family:var(--ff-display);
  font-weight:400;        /* 300 → 400, S-CoreDream 은 300도 있지만 한글 작은 글씨엔 400이 깔끔 */
}
.hero__slide--1 .hero__text h2{
  font-size:clamp(52px, 6.6vw, 102px); font-weight:800; color:var(--c-primary);
  line-height:1.05; letter-spacing:-.04em; font-family:var(--ff-display);
}
.hero__slide--1 .hero__text h2 em{ color:var(--c-accent); font-style:normal; }
.hero__slide--1 .hero__text ul{ margin:36px 0 24px; display:flex; flex-direction:column; gap:8px; }
.hero__slide--1 .hero__text li{ display:flex; align-items:center; gap:10px; font-size:20px; color:var(--c-text); font-weight:600; }
.hero__slide--1 .hero__text li::before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--c-primary-soft); }
.hero__slide--1 .hero__text p{ font-size:19px; line-height:1.8; color:var(--c-muted); }

.hero__slide--1 .hero__moon{
  position:absolute; right:8%; top:50%; transform:translateY(-50%);
  width:380px; height:380px; border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%, #f0f8fc 0%, #a8d8e8 60%, #4a90ae 100%);
  box-shadow:
    inset -50px -30px 100px rgba(28,49,104,.45),
    0 0 120px rgba(63,181,217,.35);
  opacity:.92;
}
.hero__slide--1 .hero__moon::before,
.hero__slide--1 .hero__moon::after{
  content:''; position:absolute; border-radius:50%;
  background:rgba(28,49,104,.10);
}
.hero__slide--1 .hero__moon::before{ width:60px; height:60px; top:80px; left:80px; }
.hero__slide--1 .hero__moon::after{ width:40px; height:40px; bottom:90px; right:120px; opacity:.6; }

/* slide 2 — night sky with photo */
.hero__slide--2{
  background:
    linear-gradient(110deg, rgba(10,20,40,.85) 30%, rgba(28,49,104,.6) 100%),
    url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  justify-content:flex-end;
}
.hero__slide--2 .hero__text{ color:#fff; text-align:right; max-width:600px; position:relative; z-index:2; }
.hero__slide--2 .hero__text h3{
  font-family:var(--ff-script); font-weight:400;
  font-size:clamp(40px, 5vw, 72px); color:#fff; line-height:1.2; margin-bottom:32px;
  letter-spacing:.02em;
}
.hero__slide--2 .hero__text h3 em{ color:var(--c-accent); font-style:normal; }
.hero__slide--2 .hero__text p{
  font-family:var(--ff-display); font-weight:400;     /* 300 → 400 */
  font-size:18px; line-height:1.9;
  color:rgba(255,255,255,.88); margin-bottom:18px;
}
.hero__slide--2 .hero__text .sign{
  margin-top:32px; font-family:var(--ff-script);
  font-size:24px; color:var(--c-accent); letter-spacing:.05em;
}

/* hero controls */
.hero__dots{
  position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:5;
}
.hero__dots button{
  width:10px; height:10px; border-radius:99px;
  background:rgba(255,255,255,.45); transition:all .3s;
}
.hero__dots button.is-active{ width:38px; background:var(--c-accent); }

.hero__nav{
  position:absolute; top:50%; transform:translateY(-50%);
  width:48px; height:48px; border-radius:50%;
  background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3);
  color:#fff; display:grid; place-items:center; z-index:5;
  backdrop-filter:blur(6px); transition:background .2s;
}
.hero__nav:hover{ background:rgba(255,255,255,.32); }
.hero__nav--prev{ left:24px; }
.hero__nav--next{ right:24px; }
.hero__nav svg{ width:20px; height:20px; }

/* ============================================
   FOCUS — 진료 카테고리
   ============================================ */
.focus{ padding-bottom:120px; background:var(--c-bg); }
.focus__grid{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:24px;
}
.focus__card{
  position:relative; overflow:hidden; border-radius:var(--radius-md);
  background:#0a1428; aspect-ratio: 3/4;
  cursor:pointer; box-shadow:var(--shadow-sm);
  transition:transform .35s ease, box-shadow .35s ease;
}
.focus__card:hover{ transform:translateY(-6px); box-shadow:var(--shadow-lg); }
.focus__card img{
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  opacity:.55; transition:opacity .4s ease, transform .6s ease;
}
.focus__card:hover img{ opacity:.35; transform:scale(1.06); }
.focus__card::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(10,20,40,.2) 0%, rgba(10,20,40,.85) 100%);
  z-index:1;
}
.focus__inner{
  position:relative; z-index:2; height:100%;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:32px 28px; color:#fff;
}
.focus__inner h5{
  font-size:14px; color:var(--c-accent-soft); font-weight:500; margin-bottom:8px; letter-spacing:.02em;
  font-family:var(--ff-display);
}
.focus__inner h4{
  font-size:26px; color:#fff; font-weight:700; line-height:1.3; margin-bottom:14px;
  font-family:var(--ff-display);
}
.focus__inner p{
  font-size:14px; line-height:1.6; color:rgba(255,255,255,.85);
  max-height:0; opacity:0; overflow:hidden;
  transition:max-height .4s ease, opacity .3s ease, margin .4s ease;
}
.focus__card:hover .focus__inner p{ max-height:160px; opacity:1; margin-bottom:8px; }
.focus__inner .arrow{
  width:42px; height:42px; border-radius:50%; border:1px solid rgba(255,255,255,.4);
  display:grid; place-items:center; margin-top:18px;
  transition:background .25s, border-color .25s, color .25s;
}
.focus__card:hover .focus__inner .arrow{ background:var(--c-accent); border-color:var(--c-accent); color:var(--c-primary-deep); }

/* ============================================
   BANNER — 체크리스트
   ============================================ */
.banner-checklist{
  position:relative; padding:130px 0;
  background:
    linear-gradient(120deg, rgba(10,20,40,.82) 40%, rgba(28,49,104,.6) 100%),
    url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat fixed;
  color:#fff; overflow:hidden;
}
.banner-checklist .container{ position:relative; z-index:2; max-width:780px; margin-left:auto; margin-right:8%; }
.banner-checklist h3{
  font-size:clamp(28px, 3.6vw, 48px); color:#fff; line-height:1.25; font-weight:800;
  margin-bottom:36px; font-family:var(--ff-display);
}
.banner-checklist h3 .pen{
  /* 큰 헤딩은 흰 글자에 골드 하이라이트만 (가독성 좋음) */
  background:linear-gradient(transparent 55%, rgba(63,181,217,.55) 55%);
  padding:0 6px;
  color:#fff;
}
.banner-checklist__list{ display:flex; flex-direction:column; gap:14px; margin-bottom:36px; }
.banner-checklist__list li{
  background:#fff; color:var(--c-ink);
  padding:18px 28px 18px 60px; border-radius:999px;
  font-size:18px; font-weight:600; position:relative;
  border:3px solid var(--c-primary);
  font-family:var(--ff-display);
}
.banner-checklist__list li::before{
  content:''; position:absolute; left:20px; top:50%; transform:translateY(-50%);
  width:26px; height:26px; border-radius:50%; background:var(--c-accent);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231c3168' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
  background-size:16px; background-repeat:no-repeat; background-position:center;
}
.banner-checklist h4{
  font-size:clamp(20px, 2.2vw, 28px); color:#fff; font-weight:600; line-height:1.5;
  font-family:var(--ff-display);
}
.banner-checklist h4 .pen{
  /* 강조 — 골드 알약 + 진한 네이비 텍스트, 전체 또렷하게 */
  background:var(--c-accent);
  color:var(--c-primary-deep);
  padding:3px 12px;
  border-radius:6px;
  font-weight:800;
  display:inline-block;
  box-shadow:0 2px 8px rgba(63,181,217,.3);
}

/* ============================================
   POINT BANNER — 달빛치과의 약속
   ============================================ */
.banner-point{
  position:relative; padding:130px 0; text-align:center; color:#fff; overflow:hidden;
  background:
    linear-gradient(180deg, rgba(28,49,104,.85) 0%, rgba(10,20,40,.92) 100%),
    url('https://images.unsplash.com/photo-1629909615184-74f495363b67?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat fixed;
}
.banner-point::before{
  /* moon dot */
  content:''; position:absolute; top:60px; right:8%;
  width:80px; height:80px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #d7eef6 0%, #3fb5d9 70%, transparent 100%);
  opacity:.35;
  box-shadow:0 0 40px rgba(63,181,217,.4);
}
.banner-point h3{
  font-size:clamp(30px, 3.6vw, 48px); color:#fff; line-height:1.3; font-weight:800;
  font-family:var(--ff-display);
}
.banner-point h3 span{ color:var(--c-accent); }
.banner-point .divider{
  width:1px; height:40px; background:rgba(255,255,255,.5); margin:36px auto;
}
.banner-point h5{
  font-size:18px; line-height:1.85; color:rgba(255,255,255,.92);
  font-weight:400;          /* 300 → 400 */
  font-family:var(--ff-display);
}
.banner-point h4{
  font-size:22px; color:#fff; line-height:1.55; font-weight:600; margin-top:36px;
  font-family:var(--ff-display);
}

/* ============================================
   BLOG — 건강 정보
   ============================================ */
.blog{ padding-bottom:120px; background:var(--c-bg-section); }
.blog .container{ max-width:1280px; }
.blog__grid{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:24px;
}
.blog__card{
  background:#fff; border-radius:var(--radius-md); overflow:hidden;
  border:1px solid var(--c-line); box-shadow:var(--shadow-sm);
  transition:transform .3s ease, box-shadow .3s ease;
  display:flex; flex-direction:column;
}
.blog__card:hover{ transform:translateY(-4px); box-shadow:var(--shadow-md); }
.blog__thumb{
  aspect-ratio:4/3; background:var(--c-bg-soft); overflow:hidden;
}
.blog__thumb img{
  width:100%; height:100%; object-fit:cover; transition:transform .5s ease;
}
.blog__card:hover .blog__thumb img{ transform:scale(1.05); }
.blog__body{ padding:22px 22px 26px; flex:1; display:flex; flex-direction:column; gap:10px; }
.blog__tag{ font-size:12px; color:var(--c-primary); font-weight:600; letter-spacing:.05em; }
.blog__title{
  font-size:17px; line-height:1.45; color:var(--c-ink); font-weight:700;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  min-height:calc(17px * 1.45 * 2); font-family:var(--ff-display);
}


/* ============================================
   RESPONSIVE — index 고유 섹션만
   ============================================ */
@media (max-width: 1100px){
  .focus__grid{ grid-template-columns:repeat(2, 1fr); }
  .blog__grid{ grid-template-columns:repeat(2, 1fr); }
  .hero__slide--1 .hero__moon{ width:280px; height:280px; right:5%; opacity:.6; }
}
@media (max-width: 720px){
  /* 모바일 hero */
  .hero{ height:auto; min-height:560px; }
  .hero__slide{ padding:80px 24px 100px; min-height:560px; align-items:center; }
  .hero__slide--1 .hero__moon{ display:none; }
  .hero__slide--2{ justify-content:center; }
  .hero__slide--2 .hero__text{ text-align:left; }
  .hero__nav{ display:none; }

  .focus__grid{ grid-template-columns:1fr; gap:16px; }
  .focus__card{ aspect-ratio:5/3; }
  .focus__inner p{ max-height:80px; opacity:1; margin-bottom:6px; }

  .banner-checklist{ padding:80px 0; background-attachment:scroll; }
  .banner-checklist .container{ margin-right:auto; padding:0 24px; }
  .banner-checklist__list li{ font-size:15px; padding:14px 22px 14px 52px; }
  .banner-point{ padding:80px 0; background-attachment:scroll; }
  .banner-point h5{ font-size:16px; }

  .blog__grid{ grid-template-columns:1fr; }
}
</style>

<!-- ============================================================
     ⚠️ 스크립트 순서 중요:
        ① 인터랙션 listener 먼저 등록 (아래 inline <script>)
        ② data.js (콘텐츠)
        ③ render.js (DOM 주입 → 'site:rendered' 발행)
        이래야 render 가 발행하는 이벤트를 listener 가 확실히 받음.
     ============================================================ -->
<script>
/* ============================================
   INTRO splash — 항상 작동하도록 site:rendered 밖에서 즉시 셋업
   (render.js 에러가 나도 인트로는 반드시 사라지도록)
   ============================================ */
(function(){
  const intro = document.getElementById('intro');
  if(!intro) return;

  const hide = () => {
    intro.classList.add('is-hidden');
    sessionStorage.setItem('intro_seen', '1');
    setTimeout(() => intro.style.display = 'none', 900);
  };

  // 이미 본 적 있으면 즉시 숨김
  if(sessionStorage.getItem('intro_seen')){
    intro.style.display = 'none';
    return;
  }

  // 클릭 시 즉시 사라지게 (사용자가 답답할 때)
  intro.addEventListener('click', hide);

  // 자동 fade out
  const startedAt = Date.now();
  let hideTimer = setTimeout(hide, 3200);

  if(window.loadSiteData){
    window.loadSiteData().then(data => {
      const dur = (data && data.intro && data.intro.duration) || 3200;
      const elapsed = Date.now() - startedAt;
      const remaining = Math.max(0, dur - elapsed);
      clearTimeout(hideTimer);
      hideTimer = setTimeout(hide, remaining);
    }).catch(() => {});
  }
})();

/* ============================================
   Mobile menu — 햄버거는 정적 HTML 요소만 쓰므로 즉시 부착
   (render.js 와 무관하게 항상 작동)
   ============================================ */
(function(){
  const init = () => {
    const btn    = document.getElementById('menuBtn');
    const header = document.querySelector('.header');
    if(!btn || !header) return;
    if(btn.dataset.bound) return;
    btn.dataset.bound = '1';

    btn.addEventListener('click', () => {
      header.classList.toggle('is-menu-open');
    });
    header.addEventListener('click', e => {
      if(e.target.tagName === 'A' && header.classList.contains('is-menu-open')){
        header.classList.remove('is-menu-open');
      }
    });
    window.addEventListener('resize', () => {
      if(window.innerWidth > 1100) header.classList.remove('is-menu-open');
    });
  };
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

/* 나머지 인터랙션 (캐러셀 등) 은 콘텐츠가 주입된 뒤 동작 */
document.addEventListener('site:rendered', function(){
console.log('[interaction] site:rendered listener 실행 → 캐러셀/모달 초기화');

/* ============================================
   HERO carousel
   ============================================ */
(function(){
  const track = document.getElementById('heroTrack');
  const hero  = document.getElementById('hero');
  if(!track || !hero){ console.warn('[carousel] track/hero 못 찾음'); return; }
  const slides = track.children;
  const total  = slides.length;
  const dotsBox= document.getElementById('heroDots');
  console.log('[carousel] init — slides:', total, 'dotsBox:', !!dotsBox);
  if(!dotsBox){ console.warn('[carousel] heroDots 못 찾음'); return; }
  let idx = 0, timer;

  for(let i=0;i<total;i++){
    const b = document.createElement('button');
    b.type='button'; b.setAttribute('aria-label', '슬라이드 '+(i+1));
    b.addEventListener('click', ()=> go(i));
    dotsBox.appendChild(b);
  }
  const dots = dotsBox.children;

  function go(i){
    idx = (i + total) % total;
    track.style.transform = `translateX(-${idx*100}%)`;
    for(let k=0;k<dots.length;k++) dots[k].classList.toggle('is-active', k===idx);
    hero.dataset.active = idx;
    restart();
  }
  function next(){ go(idx+1); }
  function prev(){ go(idx-1); }
  function restart(){ clearInterval(timer); timer = setInterval(next, 6000); }

  document.getElementById('heroPrev').addEventListener('click', prev);
  document.getElementById('heroNext').addEventListener('click', next);
  hero.addEventListener('mouseenter', ()=> clearInterval(timer));
  hero.addEventListener('mouseleave', restart);

  let sx = 0;
  hero.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
  hero.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - sx;
    if(Math.abs(dx) > 40){ dx < 0 ? next() : prev(); }
  });

  go(0);
})();

/* ============================================
   MODAL system
   ============================================ */
(function(){
  const open = (id)=>{
    const m = document.getElementById('modal-'+id);
    if(!m) return;
    m.classList.add('is-open');
    m.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
  };
  const close = (m)=>{
    m.classList.remove('is-open');
    m.setAttribute('aria-hidden','true');
    document.body.style.overflow = '';
  };
  document.querySelectorAll('[data-modal-open]').forEach(btn=>{
    btn.addEventListener('click', ()=> open(btn.dataset.modalOpen));
  });
  document.querySelectorAll('[data-modal-close]').forEach(el=>{
    el.addEventListener('click', e=>{
      const m = e.currentTarget.closest('.modal');
      if(m) close(m);
    });
  });
  document.addEventListener('keydown', e=>{
    if(e.key === 'Escape') document.querySelectorAll('.modal.is-open').forEach(close);
  });
})();

/* ============================================
   BOTTOM bar — show after hero, hide near footer
   ============================================ */
(function(){
  const bar = document.getElementById('bottomBar');
  const footer = document.querySelector('.copy');
  if(!bar) return;
  const onScroll = () => {
    const scrollY = window.scrollY;
    const winH    = window.innerHeight;
    bar.classList.toggle('is-visible', scrollY > 600);
    if(footer){
      const footerTop = footer.getBoundingClientRect().top + scrollY;
      // hide when bar would overlap footer (or doc-end is near)
      const nearFooter = (scrollY + winH) > footerTop - 40;
      bar.classList.toggle('is-near-footer', nearFooter);
    }
  };
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onScroll);
  onScroll();
})();

/* ============================================
   Form submissions — basic validation
   ============================================ */
(function(){
  const handle = (form, label)=>{
    if(!form) return;
    form.addEventListener('submit', e=>{
      e.preventDefault();
      const data = new FormData(form);
      if(!data.get('name') || form.elements['name'].value.trim().length < 2){
        alert('이름을 2글자 이상 입력해 주세요.');
        return;
      }
      if(!data.get('phone') || !/^[\d\-]{9,13}$/.test(form.elements['phone'].value.replace(/\s/g,''))){
        alert('올바른 연락처를 입력해 주세요.');
        return;
      }
      alert(label + ' 신청이 접수되었습니다. 곧 연락드리겠습니다.');
      form.reset();
      const m = form.closest('.modal');
      if(m){ m.classList.remove('is-open'); document.body.style.overflow=''; }
    });
  };
  handle(document.getElementById('modalForm'), '상담');
  handle(document.getElementById('bottomForm'), '빠른 상담');
})();

/* ============================================
   Notice popup
   ============================================ */
(function(){
  const popups = Array.from(document.querySelectorAll('.notice-popup'));
  if(!popups.length) return;

  const sizePopup = (popup) => {
    const img = popup.querySelector('.notice-popup__body img');
    if(!img) return;

    const naturalWidth = img.naturalWidth || img.width;
    const naturalHeight = img.naturalHeight || img.height;
    if(!naturalWidth || !naturalHeight) return;

    const isMobile = window.innerWidth <= 720;
    const viewportWidth = window.innerWidth - (isMobile ? 32 : 48);
    const viewportHeight = window.innerHeight - (isMobile ? 188 : 220);
    const ratio = naturalWidth / naturalHeight;
    const minWidth = isMobile ? 220 : 280;
    const maxWidth = isMobile ? 380 : 560;
    const fittedWidth = Math.min(viewportWidth, viewportHeight * ratio, maxWidth);
    const safeMinWidth = Math.min(minWidth, viewportWidth);
    const popupWidth = Math.max(safeMinWidth, fittedWidth);

    popup.style.setProperty('--notice-width', `${Math.round(popupWidth)}px`);
  };

  popups.forEach((popup, index) => {
    if(popup.dataset.bound) return;
    popup.dataset.bound = '1';

    const storageKey = popup.dataset.storageKey || `notice-popup-hide-until-${index}`;
    const now = Date.now();
    let hiddenUntil = 0;

    try {
      hiddenUntil = parseInt(localStorage.getItem(storageKey) || '0', 10);
    } catch (_) {}

    const open = () => {
      popup.classList.add('is-open');
      popup.setAttribute('aria-hidden', 'false');
    };

    const close = () => {
      popup.classList.remove('is-open');
      popup.setAttribute('aria-hidden', 'true');
    };

    popup.querySelectorAll('[data-notice-close]').forEach(el => {
      el.addEventListener('click', close);
    });

    const img = popup.querySelector('.notice-popup__body img');
    if(img){
      if(img.complete) sizePopup(popup);
      else img.addEventListener('load', () => sizePopup(popup), { once:true });
    }

    const hideDayBtn = popup.querySelector('[data-notice-hide-day]');
    if(hideDayBtn){
      hideDayBtn.addEventListener('click', () => {
        try {
          localStorage.setItem(storageKey, String(Date.now() + 24 * 60 * 60 * 1000));
        } catch (_) {}
        close();
      });
    }

    if(!(hiddenUntil > now)) open();
  });

  if(!document.body.dataset.noticeResizeBound){
    document.body.dataset.noticeResizeBound = '1';
    window.addEventListener('resize', () => {
      document.querySelectorAll('.notice-popup').forEach(sizePopup);
    });
  }

  if(!document.body.dataset.noticeEscBound){
    document.body.dataset.noticeEscBound = '1';
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape'){
        document.querySelectorAll('.notice-popup.is-open').forEach(popup => {
          popup.classList.remove('is-open');
          popup.setAttribute('aria-hidden', 'true');
        });
      }
    });
  }
})();

}); /* end site:rendered listener */
</script>
