<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>네비게이션 임플란트 - 달빛치과</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* ==============================================================
           [임플란트 상세 전용 CSS]
           ============================================================== */
        body { margin: 0; background: #fff; }
        section { padding: 100px 20px; }
        .inner { max-width: 1100px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 2.5rem; color: var(--night-navy); font-weight: 900; margin-bottom: 15px; }
        .section-title h2 span { color: var(--moon-gold); }
        .section-title p { color: var(--text-gray); font-size: 1.1rem; }

        /* 1. Hero Section (높이 완벽 고정) */
        .implant-hero {
            width: 100%; 
            height: 350px;
            margin-top: 80px;
            padding: 0 !important;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            text-align: center; 
            background-size: cover; 
            background-position: center;
            box-sizing: border-box;
        }
        .implant-hero h1 { font-size: 3.2rem; font-weight: 900; margin-bottom: 15px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .implant-hero p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; }

        /* 2. Point Section (핵심 강점) */
        .point-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 50px; }
        .point-card { background: #fff; padding: 40px 30px; border-radius: 20px; text-align: center; border: 1px solid #eee; transition: 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
        .point-card:hover { transform: translateY(-10px); border-color: var(--moon-gold); box-shadow: 0 15px 30px rgba(21, 34, 56, 0.08); }
        .point-card .icon-circle { width: 80px; height: 80px; background: var(--night-navy); color: var(--moon-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 2rem; font-weight: 900; }
        .point-card h3 { color: var(--night-navy); font-size: 1.4rem; margin-bottom: 15px; font-weight: 800; }
        .point-card p { color: #666; font-size: 0.95rem; line-height: 1.6; word-break: keep-all; }

        /* ★ [신규 추가] 유튜브 영상 섹션 CSS ★ */
        .video-section { padding: 0 20px 100px; background: #fff; }
        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; 
            max-width: 900px; margin: 0 auto; border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #eee; background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 3. Comparison Section (비교표 - 가독성 및 테두리 완벽 수정) */
        .compare-section { background: #fdfdfd; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .compare-box { max-width: 900px; margin: 0 auto; padding-bottom: 10px; }
        
        .compare-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .compare-table th { padding: 30px 20px; font-size: 1.2rem; border-bottom: 1px solid #eee; }
        .compare-table td { padding: 25px 20px; text-align: center; border-bottom: 1px solid #eee; }
        
        .label-col { background: #fafafa; font-weight: 800; color: #333; width: 25%; font-size: 1rem; border-right: 1px solid #eee; }
        .trad-col { color: #333; background: #fff; width: 35%; font-size: 1rem; } 
        
        .navi-col { background: #fff; color: var(--night-navy); font-weight: 800; width: 40%; border-left: 2px solid var(--moon-gold); border-right: 2px solid var(--moon-gold); }
        .navi-col-head { background: var(--night-navy) !important; color: var(--moon-gold) !important; font-weight: 900 !important; font-size: 1.3rem !important; border-top: 2px solid var(--moon-gold); border-radius: 0 15px 0 0; }
        
        .compare-table tbody tr:last-child td { border-bottom: none; }
        .compare-table tbody tr:last-child .navi-col { border-bottom: 2px solid var(--moon-gold); border-radius: 0 0 15px 0; }
        .compare-table thead tr th:first-child { border-radius: 15px 0 0 0; }
        .compare-table tbody tr:last-child td:first-child { border-radius: 0 0 0 15px; }

        .navi-text { color: var(--moon-gold); font-size: 1.05rem; display: block; margin-top: 5px; }

        /* 4. Process Section (진행 과정 - 지그재그 스토리텔링) */
        .process-item { display: flex; align-items: center; gap: 50px; margin-bottom: 80px; }
        .process-item:nth-child(even) { flex-direction: row-reverse; }
        .proc-img { flex: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .proc-img img { width: 100%; display: block; }
        .proc-text { flex: 1; }
        .proc-text .step-num { font-size: 3.5rem; font-weight: 900; color: var(--moon-gold); opacity: 0.3; line-height: 1; }
        .proc-text h3 { font-size: 2rem; color: var(--night-navy); margin: -20px 0 20px 0; font-weight: 800; }
        .proc-text p { font-size: 1.1rem; color: #555; line-height: 1.8; word-break: keep-all; }
        .proc-text ul { margin-top: 20px; padding: 0; }
        .proc-text li { list-style: none; padding-left: 20px; position: relative; margin-bottom: 8px; color: #777; font-weight: 500; }
        .proc-text li::before { content: '■'; color: var(--moon-gold); position: absolute; left: 0; top: 2px; font-size: 0.8rem; }

        /* 5. Target Section (추천 대상) */
        .target-section { background: #f8f9fa; }
        .target-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 50px; }
        .target-item { background: #fff; padding: 40px 20px; border-radius: 20px; border: 1px solid #eee; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.02); text-align: center; }
        .target-item:hover { transform: translateY(-10px); border-color: var(--moon-gold); box-shadow: 0 15px 35px rgba(21, 34, 56, 0.08); }
        .target-item .t-icon { font-size: 3rem; margin-bottom: 20px; display: block; filter: grayscale(0.2); }
        .target-item h4 { font-size: 1.2rem; color: var(--night-navy); margin-bottom: 15px; font-weight: 800; }
        .target-item p { font-size: 0.95rem; color: #777; word-break: keep-all; line-height: 1.6; }

        /* Mobile */
        @media (max-width: 768px) {
            .implant-hero { height: 260px; margin-top: 65px; }
            .implant-hero h1 { font-size: 2.2rem; }
            .point-grid { grid-template-columns: 1fr; gap: 20px; }
            .compare-table { font-size: 0.85rem; }
            .compare-table .label-col { width: 30%; }
            .process-item { flex-direction: column !important; text-align: left; gap: 30px; }
            .target-grid { grid-template-columns: repeat(2, 1fr); }
            .target-item { padding: 30px 15px; }
            .video-section { padding: 0 20px 60px; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <main>
        <section class="implant-hero" id="hero-section"></section>

        <section>
            <div class="inner">
                <div class="section-title">
                    <h2>왜 <span>네비게이션</span> 인가요?</h2>
                    <p>기존 방식의 한계를 뛰어넘는 디지털 정밀 기술의 집합체입니다.</p>
                </div>
                <div class="point-grid" id="point-container"></div>
            </div>
        </section>

        <section class="video-section" id="video-section"></section>

        <section class="compare-section">
            <div class="inner">
                <div class="section-title">
                    <h2>차이가 큰 <span class="highlight" style="color:var(--moon-gold);">결과</span></h2>
                    <p>일반 임플란트와 오스템 원가이드, 무엇을 선택하시겠습니까?</p>
                </div>
                <div class="compare-box">
                    <table class="compare-table">
                        <thead>
                            <tr>
                                <th class="label-col">구분</th>
                                <th class="trad-col">일반 시술</th>
                                <th class="navi-col navi-col-head">네비게이션 (원가이드)</th>
                            </tr>
                        </thead>
                        <tbody id="compare-container"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section>
            <div class="inner">
                <div class="section-title">
                    <h2>시술 <span>과정</span> 안내</h2>
                    <p>달빛치과의 체계적인 4단계 디지털 프로세스입니다.</p>
                </div>
                <div id="process-container"></div>
            </div>
        </section>

        <section class="target-section">
            <div class="inner">
                <div class="section-title">
                    <h2>이런 분들께 <span class="highlight" style="color:var(--moon-gold);">원가이드</span>를 추천합니다</h2>
                    <p>더 안전하고 편안한 임플란트를 원하신다면 선택하세요.</p>
                </div>
                <div class="target-grid" id="target-container"></div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

<script src="common.js"></script>

    <script>
        // 임플란트 페이지 전용 렌더링
        function renderPage(data) {
            const implantData = data.implantPage;

            // 1. Hero 렌더링
            document.getElementById('hero-section').style.backgroundImage = `linear-gradient(rgba(21, 34, 56, 0.8), rgba(21, 34, 56, 0.8)), url('${implantData.hero.bg}')`;
            document.getElementById('hero-section').innerHTML = `
                <h1>${implantData.hero.title}</h1>
                <p>${implantData.hero.subtitle}</p>
            `;

            // 2. 포인트 렌더링
            document.getElementById('point-container').innerHTML = implantData.points.map(p => `
                <div class="point-card">
                    <div class="icon-circle">${p.icon}</div>
                    <h3>${p.title}</h3>
                    <p>${p.desc}</p>
                </div>
            `).join('');

            // 3. 비디오 렌더링
            if(implantData.videoUrl) {
                document.getElementById('video-section').innerHTML = `
                    <div class="inner">
                        <div class="video-container">
                            <iframe src="${implantData.videoUrl}" title="오스템 원가이드 안내 영상" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                `;
            }

            // 4. 비교표 렌더링
            document.getElementById('compare-container').innerHTML = implantData.comparison.map(c => `
                <tr>
                    <td class="label-col">${c.label}</td>
                    <td class="trad-col">${c.traditional}</td>
                    <td class="navi-col"><strong>${c.navi}</strong><span class="navi-text">${c.naviSub}</span></td>
                </tr>
            `).join('');

            // 5. 프로세스 렌더링
            document.getElementById('process-container').innerHTML = implantData.timeline.map(t => `
                <div class="process-item">
                    <div class="proc-img"><img src="${t.img}" alt="${t.title}"></div>
                    <div class="proc-text">
                        <div class="step-num">${t.step.replace('STEP ', '0')}</div>
                        <h3>${t.title}</h3>
                        <p>${t.desc}</p>
                        <ul>
                            ${t.details.map(detail => `<li>${detail}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');

            // 6. 타겟 렌더링
            document.getElementById('target-container').innerHTML = implantData.target.map(t => `
                <div class="target-item">
                    <span class="t-icon">${t.icon}</span>
                    <h4>${t.title}</h4>
                    <p>${t.desc}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
