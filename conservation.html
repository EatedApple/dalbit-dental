<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>충치/신경치료 - 달빛치과</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* ==============================================================
           [충치/신경치료 - 투명교정 UI 일관성 100% 매칭]
           ============================================================== */
        body { margin: 0; background: #fff; }
        
        /* 전역 섹션 설정 */
        section { padding: 100px 20px; }
        .inner { max-width: 1100px; margin: 0 auto; }
        
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 2.5rem; color: var(--night-navy); font-weight: 900; margin-bottom: 15px; }
        .section-title h2 span { color: var(--moon-gold); }
        .section-title p { color: var(--text-gray); font-size: 1.1rem; }

        /* 1. Hero Section (태그를 div로 변경하여 section 패딩 간섭 제거) */
        .sub-hero {
            width: 100%; 
            height: 350px; /* 투명교정과 동일하게 고정 */
            margin-top: 80px; /* 헤더 높이 대응 */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            text-align: center; 
            background-size: cover; 
            background-position: center;
            box-sizing: border-box;
            padding: 0 !important;
        }
        .sub-hero h1 { font-size: 3.2rem; font-weight: 900; margin: 0 0 15px 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .sub-hero p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; margin: 0; }

        /* 2. Intro 메시지 */
        .intro-msg { text-align: center; padding: 100px 20px; background: #fdfdfd; border-bottom: 1px solid #eee; }
        .intro-msg h3 { font-size: 2.3rem; color: var(--night-navy); margin-bottom: 25px; font-weight: 900; line-height: 1.4; }
        .intro-msg h3 span { color: var(--moon-gold); }
        .intro-msg p { font-size: 1.2rem; color: #555; line-height: 1.9; max-width: 850px; margin: 0 auto; word-break: keep-all; }

        /* 3. 진행 단계 (카드형) */
        .stage-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 40px; }
        .stage-item { background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .stage-head { background: var(--night-navy); color: var(--moon-gold); padding: 12px; font-weight: 800; font-size: 0.9rem; }
        .stage-img-wrap { width: 100%; height: 140px; background: #f9f9f9; }
        .stage-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .stage-body { padding: 25px 15px; }
        .stage-body h4 { font-size: 1.25rem; color: var(--night-navy); margin-bottom: 10px; font-weight: 800; }
        .stage-body p { font-size: 0.9rem; color: #777; line-height: 1.6; min-height: 55px; margin: 0; word-break: keep-all; }

        /* 4. 신경치료 상세 */
        .endo-section { background: #fdfdfd; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .endo-container { display: flex; gap: 50px; align-items: center; }
        .endo-info { flex: 1.2; }
        .endo-info h3 { font-size: 2.2rem; color: var(--night-navy); margin-bottom: 20px; font-weight: 900; }
        .endo-info h3 span { color: var(--moon-gold); }
        .endo-img-small { width: 350px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .endo-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 25px; }
        .endo-step-card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #eee; border-top: 3px solid var(--moon-gold); }
        .endo-step-card span { display: block; font-weight: 900; color: var(--moon-gold); margin-bottom: 8px; font-size: 0.8rem; }
        .endo-step-card h5 { font-size: 1.1rem; margin: 0 0 8px 0; color: var(--night-navy); font-weight: 800; }
        .endo-step-card p { font-size: 0.85rem; color: #777; line-height: 1.5; margin: 0; word-break: keep-all; }

        /* 5. 보철 재료 비교표 */
        .compare-box { overflow-x: auto; margin-top: 30px; }
        .compare-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; }
        .compare-table th { padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; font-size: 1.1rem; color: var(--night-navy); font-weight: 800; }
        .compare-table td { padding: 20px; text-align: center; border-bottom: 1px solid #eee; border-right: 1px solid #eee; font-size: 0.95rem; }
        .compare-table td:last-child { border-right: none; }
        .label-col { background: #fafafa; font-weight: 800; color: #333; width: 20%; }

        /* 6. 약속 강점 (Strength) */
        .strength-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .strength-item { display: flex; gap: 20px; align-items: center; background: #fff; padding: 25px; border-radius: 15px; border: 1px solid #eee; }
        .strength-icon { font-size: 2rem; }
        .strength-text h5 { font-size: 1.2rem; margin: 0 0 5px 0; color: var(--night-navy); font-weight: 800; }
        .strength-text p { font-size: 0.95rem; color: #666; margin: 0; line-height: 1.5; }

        /* 모바일 대응 (투명교정과 동일하게 수정) */
        @media (max-width: 768px) {
            .sub-hero { height: 260px; margin-top: 65px; } /* Ortho와 동일 */
            .sub-hero h1 { font-size: 2.2rem; }
            .intro-msg h3 { font-size: 1.8rem; }
            .stage-grid, .endo-container, .endo-steps, .strength-grid { grid-template-columns: 1fr; flex-direction: column; }
            .endo-img-small { width: 100%; margin-top: 20px; }
            .compare-table { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <main>
        <div class="sub-hero" id="hero-section"></div>

        <section class="intro-msg">
            <div class="inner" id="intro-container"></div>
        </section>

        <section>
            <div class="inner">
                <div class="section-title">
                    <h2>충치 <span>진행 단계</span> 안내</h2>
                    <p>초기에 발견할수록 자연치아 보존율이 높아집니다.</p>
                </div>
                <div id="stage-container" class="stage-grid"></div>
            </div>
        </section>

        <section style="background: #fafafa;">
            <div class="inner">
                <div class="section-title">
                    <h2>나에게 맞는 <span>맞춤 치료법</span> 비교</h2>
                    <p>충치의 범위와 치아 위치에 따라 최적의 재료가 결정됩니다.</p>
                </div>
                <div class="compare-box">
                    <table class="compare-table">
                        <thead>
                            <tr>
                                <th class="label-col">구분</th>
                                <th>레진 (Resin)</th>
                                <th>인레이 (Inlay)</th>
                                <th>크라운 (Crown)</th>
                            </tr>
                        </thead>
                        <tbody id="compare-container"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="endo-section">
            <div class="inner" id="endo-container"></div>
        </section>

        <section>
            <div class="inner">
                <div class="section-title">
                    <h2>달빛치과의 <span>약속</span></h2>
                </div>
                <div id="strength-container" class="strength-grid"></div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="common.js"></script>
    <script>
        function renderPage(data) {
            const consData = data.conservationPage;

            // Hero 렌더링
            const heroEl = document.getElementById('hero-section');
            heroEl.style.backgroundImage = `linear-gradient(rgba(21, 34, 56, 0.85), rgba(21, 34, 56, 0.85)), url('${consData.hero.bg}')`;
            heroEl.innerHTML = `<h1>${consData.hero.title}</h1><p>${consData.hero.subtitle}</p>`;

            // Intro 렌더링
            document.getElementById('intro-container').innerHTML = `
                <h3>${consData.intro.title}</h3>
                <p>${consData.intro.desc}</p>
            `;

            // Stages 렌더링
            document.getElementById('stage-container').innerHTML = consData.stages.map(s => `
                <div class="stage-item">
                    <div class="stage-head">${s.head}</div>
                    <div class="stage-img-wrap"><img src="${s.img}" alt="${s.title}"></div>
                    <div class="stage-body">
                        <h4>${s.title}</h4>
                        <p>${s.desc}</p>
                    </div>
                </div>
            `).join('');

            // Comparison 렌더링
            document.getElementById('compare-container').innerHTML = consData.comparison.map(c => `
                <tr>
                    <td class="label-col">${c.label}</td>
                    <td>${c.resin}</td>
                    <td>${c.inlay}</td>
                    <td>${c.crown}</td>
                </tr>
            `).join('');

            // Endo 렌더링
            document.getElementById('endo-container').innerHTML = `
                <div class="endo-container">
                    <div class="endo-info">
                        <h3>${consData.endo.title}</h3>
                        <p>${consData.endo.desc}</p>
                        <div class="endo-steps">
                            ${consData.endo.steps.map(st => `
                                <div class="endo-step-card">
                                    <span>${st.step}</span>
                                    <h5>${st.title}</h5>
                                    <p>${st.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <img src="${consData.endo.img}" class="endo-img-small" alt="신경치료">
                </div>
            `;

            // Strengths 렌더링
            document.getElementById('strength-container').innerHTML = consData.strengths.map(s => `
                <div class="strength-item">
                    <span class="strength-icon">${s.icon}</span>
                    <div class="strength-text">
                        <h5>${s.title}</h5>
                        <p>${s.desc}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
