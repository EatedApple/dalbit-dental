<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>맞춤 투명교정 - 달빛치과</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* ==============================================================
           [교정 상세 전용 CSS - 통합된 시각적 흐름 적용]
           ============================================================== */
        body { margin: 0; background: #fff; }
        section { padding: 100px 20px; }
        .inner { max-width: 1100px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 2.5rem; color: var(--night-navy); font-weight: 900; margin-bottom: 15px; }
        .section-title h2 span { color: var(--moon-gold); }
        .section-title p { color: var(--text-gray); font-size: 1.1rem; }

        /* 1. Hero Section */
        .sub-hero {
            width: 100%; height: 350px; margin-top: 80px; padding: 0 !important;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; text-align: center; background-size: cover; background-position: center;
            box-sizing: border-box;
        }
        .sub-hero h1 { font-size: 3.2rem; font-weight: 900; margin-bottom: 15px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .sub-hero p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; }

        /* 2. Video Section */
        .video-section { padding: 100px 20px; background: #fff; text-align: center; }
        .video-wrapper { max-width: 900px; margin: 0 auto; }
        .video-intro { text-align: center; margin-bottom: 50px; }
        .video-intro h2 { font-size: 2.2rem; color: var(--night-navy); font-weight: 900; margin-bottom: 15px; }
        .video-intro h2 span { color: var(--moon-gold); }
        .video-intro p { color: var(--text-gray); font-size: 1.1rem; }
        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; 
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #eee; background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .local-video { width: 100%; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); background: #000; outline: none; }

        /* 3. Comparison Section (표) */
        .compare-section { background: #fdfdfd; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .compare-box { max-width: 900px; margin: 0 auto; padding-bottom: 10px; }
        .compare-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .compare-table th { padding: 30px 20px; font-size: 1.2rem; border-bottom: 1px solid #eee; }
        .compare-table td { padding: 25px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .label-col { background: #fafafa; font-weight: 800; color: #333; width: 25%; font-size: 1rem; border-right: 1px solid #eee; }
        .trad-col { color: #333; background: #fff; width: 35%; font-size: 1rem; } 
        .magic-col { background: #fff; color: var(--night-navy); font-weight: 800; width: 40%; border-left: 2px solid var(--moon-gold); border-right: 2px solid var(--moon-gold); }
        .magic-col-head { background: var(--night-navy) !important; color: var(--moon-gold) !important; font-weight: 900 !important; font-size: 1.3rem !important; border-top: 2px solid var(--moon-gold); border-radius: 0 15px 0 0; }
        .compare-table tbody tr:last-child td { border-bottom: none; }
        .compare-table tbody tr:last-child .magic-col { border-bottom: 2px solid var(--moon-gold); border-radius: 0 0 15px 0; }
        .compare-table thead tr th:first-child { border-radius: 15px 0 0 0; }
        .compare-table tbody tr:last-child td:first-child { border-radius: 0 0 0 15px; }

        /* 4. Timeline Section (버티컬 플로우) */
        .v-step-wrap { position: relative; padding: 20px 0; max-width: 1000px; margin: 0 auto; }
        .v-step-line { position: absolute; left: 24px; top: 50px; width: 2px; height: 100%; background: #eee; z-index: 1; }
        .v-step-item { display: flex; gap: 40px; margin-bottom: 60px; position: relative; z-index: 2; }
        .v-step-num { width: 50px; height: 50px; background: var(--night-navy); color: var(--moon-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; flex-shrink: 0; }
        .v-step-content { flex: 1; display: flex; gap: 30px; background: #fff; padding: 30px; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.03); align-items: center; }
        .v-step-img { width: 250px; height: 180px; border-radius: 12px; object-fit: cover; }
        .v-step-text { flex: 1; text-align: left; }
        .v-step-text h3 { margin: 0 0 15px 0; font-size: 1.6rem; color: var(--night-navy); font-weight: 800; }
        .v-step-text p { color: #555; line-height: 1.7; margin-bottom: 15px; }
        .v-step-text ul { padding: 0; margin: 0; }
        .v-step-text li { list-style: none; font-size: 0.95rem; color: #777; margin-bottom: 8px; padding-left: 20px; position: relative; }
        .v-step-text li::before { content: '■'; color: var(--moon-gold); font-size: 0.8rem; top: 2px; position: absolute; left: 0; }

        /* 5. Maintenance Section (타임라인 통합형) */
        .maintenance-section { padding: 0 20px 100px; background: #fff; }
        .m-final-item { display: flex; gap: 40px; position: relative; z-index: 2; }
        .m-final-icon { width: 50px; height: 50px; background: var(--moon-gold); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .m-final-content { flex: 1; text-align: left; }
        .m-final-content h2 { font-size: 2.2rem; color: var(--night-navy); font-weight: 900; margin-bottom: 10px; }
        .m-final-content h2 span { color: var(--moon-gold); }
        .m-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 40px; }
        .m-box { background: #fdfdfd; padding: 35px; border-radius: 20px; border: 1px solid #eee; border-top: 4px solid var(--moon-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .m-box h4 { font-size: 1.3rem; color: var(--night-navy); margin-bottom: 15px; font-weight: 800; }
        .m-box p { font-size: 1rem; color: var(--text-gray); line-height: 1.7; margin: 0; }

        @media (max-width: 768px) {
            .sub-hero { height: 260px; margin-top: 65px; }
            .v-step-item, .m-final-item { flex-direction: column; gap: 15px; }
            .v-step-line { display: none; }
            .v-step-content { flex-direction: column; padding: 20px; }
            .v-step-img { width: 100%; height: 200px; }
            .m-grid { grid-template-columns: 1fr; }
            .compare-table { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <main>
        <section class="sub-hero" id="hero-section"></section>
        <section class="video-section" id="video-section"></section>

        <section class="compare-section">
            <div class="inner">
                <div class="section-title">
                    <h2>차이가 큰 <span>교정 결과</span></h2>
                    <p>일반 교정과 매직얼라인, 무엇을 선택하시겠습니까?</p>
                </div>
                <div class="compare-box">
                    <table class="compare-table">
                        <thead>
                            <tr>
                                <th class="label-col">구분</th>
                                <th class="trad-col">일반 교정 (브라켓)</th>
                                <th class="magic-col magic-col-head">매직얼라인 (투명교정)</th>
                            </tr>
                        </thead>
                        <tbody id="compare-container"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="timeline-section" style="padding-bottom: 0;">
            <div class="inner">
                <div class="section-title" id="timeline-intro"></div>
                <div class="v-step-wrap">
                    <div class="v-step-line"></div> <div id="timeline-container"></div>
                    
                    <div class="m-final-item">
                        <div class="m-final-icon">✨</div>
                        <div class="m-final-content">
                            <h2>평생의 미소를 위한 <span>이중 유지 시스템</span></h2>
                            <p style="color: var(--text-gray); font-size: 1.1rem;">교정 후 치아가 돌아가려는 성질을 완벽하게 차단하여 첫 미소를 끝까지 지켜드립니다.</p>
                            <div class="m-grid" id="maintenance-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <div style="height: 100px;"></div>
    </main>

    <div id="footer-container"></div>

    <script src="common.js"></script>

    <script>
        function renderPage(data) {
            const orthoData = data.orthoPage;

            // 1. Hero
            const heroEl = document.getElementById('hero-section');
            heroEl.style.backgroundImage = `linear-gradient(rgba(26, 37, 47, 0.8), rgba(26, 37, 47, 0.8)), url('${orthoData.hero.bg}')`;
            heroEl.innerHTML = `<h1>${orthoData.hero.title}</h1><p>${orthoData.hero.subtitle}</p>`;

            // 2. Video
            if(orthoData.video && orthoData.video.url) {
                let videoHtml = orthoData.video.type === 'youtube' 
                    ? `<div class="video-container"><iframe src="${orthoData.video.url}" title="${orthoData.video.title}" allowfullscreen></iframe></div>`
                    : `<video class="local-video" src="${orthoData.video.url}" controls playsinline></video>`;
                document.getElementById('video-section').innerHTML = `
                    <div class="video-wrapper">
                        <div class="video-intro"><h2>${orthoData.intro.title}</h2><p>${orthoData.intro.desc}</p></div>
                        ${videoHtml}
                    </div>`;
            }

            // 3. 비교표
            document.getElementById('compare-container').innerHTML = orthoData.comparison.map(c => `
                <tr><td class="label-col">${c.label}</td><td class="trad-col">${c.traditional}</td><td class="magic-col"><strong>${c.magic}</strong></td></tr>
            `).join('');

            // 4. 타임라인
            document.getElementById('timeline-intro').innerHTML = `<h2>디지털 교정 <span>프로세스</span></h2><p>달빛치과만의 정교한 시스템입니다.</p>`;
            document.getElementById('timeline-container').innerHTML = orthoData.timeline.map(item => `
                <div class="v-step-item">
                    <div class="v-step-num">${item.step.replace('STEP ', '')}</div>
                    <div class="v-step-content">
                        <img src="${item.img}" class="v-step-img">
                        <div class="v-step-text">
                            <h3>${item.title}</h3><p>${item.desc}</p>
                            <ul>${item.details.map(li => `<li>${li}</li>`).join('')}</ul>
                        </div>
                    </div>
                </div>
            `).join('');

            // 5. 유지장치 (타임라인 하단에 렌더링)
            document.getElementById('maintenance-container').innerHTML = orthoData.maintenance.types.map(m => `
                <div class="m-box"><h4>${m.name}</h4><p>${m.desc}</p></div>
            `).join('');
        }
    </script>
</body>
</html>
